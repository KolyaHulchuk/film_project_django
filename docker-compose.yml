version: '3.9'

services:
    
    web:
        build: .
        image: project
        ports: 
          - "8001:8001"
        volumes:
          - .:/app
        env_file:
          - .env
        command: python manage.py runserver 0.0.0.0:8001
        depends_on:
          - db

    db:
        image: postgres:16
        env_file:
          - .env
        volumes:
          - pgdata:/var/lib/postgresql/data
        
volumes:
  pgdata:

